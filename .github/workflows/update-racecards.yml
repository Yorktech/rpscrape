name: Update Racecards Daily

on:
  schedule:
    # Run at 07:00 GMT every morning
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-racecards:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date
        id: date
        run: echo "date=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: Scrape upcoming racecards
        run: |
          cd scripts
          python racecards.py --day 1
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add racecards/
          git commit -m "chore: Update racecards for ${{ steps.date.outputs.date }}"
          git push

      - name: Checkout target repository
        if: steps.check_changes.outputs.changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: Yorktech/racing-prediction
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: target-repo

      - name: Sync racecards to target repository
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          mkdir -p target-repo/racecards
          rsync -a racecards/ target-repo/racecards/
          
      - name: Upload racecards artifact
        uses: actions/upload-artifact@v4
        with:
          name: racecards-json
          path: racecards/*.json
          if-no-files-found: error
          retention-days: 1
          
      - name: Commit and push target repository changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          cd target-repo
          if git diff --quiet; then
            echo "No changes to push to target repository"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add racecards/
          git commit -m "chore: sync racecards from rpscrape (${{ steps.date.outputs.date }})"
          git push
