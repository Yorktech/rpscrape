name: Daily Racing Sync

on:
  schedule:
    # Run at 07:30 GMT every morning
    - cron: '15 7 * * *'
  workflow_dispatch:

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          EMAIL=${{ secrets.EMAIL }}
          AUTH_STATE=${{ secrets.AUTH_STATE }}
          ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}
          EOF

      - name: Get yesterday's date
        id: yesterday
        run: echo "date=$(date -d 'yesterday' +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: Get today's date
        id: today
        run: echo "date=$(date +'%Y/%m/%d')" >> $GITHUB_OUTPUT

      - name: Download results for GB
        run: |
          cd scripts
          python rpscrape.py -d ${{ steps.yesterday.outputs.date }} -r gb
        continue-on-error: true

      - name: Download results for IRE
        run: |
          cd scripts
          python rpscrape.py -d ${{ steps.yesterday.outputs.date }} -r ire
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: Update racing data - results for ${{ steps.yesterday.outputs.date }} and racecards for ${{ steps.today.outputs.date }}"
          git push
