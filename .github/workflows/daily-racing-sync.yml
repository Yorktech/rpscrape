name: Daily Racing Sync

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          EMAIL=${{ secrets.EMAIL }}
          AUTH_STATE=${{ secrets.AUTH_STATE }}
          ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}
          EOF

      - name: Get yesterday's date
        id: yesterday
        run: echo "date=$(date -u -d 'yesterday' +'%Y/%m/%d')" >> "$GITHUB_OUTPUT"

      - name: Download results for GB
        run: |
          cd scripts
          python rpscrape.py -d "${{ steps.yesterday.outputs.date }}" -r gb
        continue-on-error: true

      - name: Download results for IRE
        run: |
          cd scripts
          python rpscrape.py -d "${{ steps.yesterday.outputs.date }}" -r ire
        continue-on-error: true

      - name: Prepare results payload
        shell: bash
        run: |
          mkdir -p out/results
          DATE_UNDERSCORE="$(echo "${{ steps.yesterday.outputs.date }}" | tr '/' '_')"

          GB_SRC="data/region/gb/all/${DATE_UNDERSCORE}.csv"
          IRE_SRC="data/region/ire/all/${DATE_UNDERSCORE}.csv"

          COUNT=0

          if [[ -f "${GB_SRC}" ]]; then
            cp "${GB_SRC}" "out/results/GB__${DATE_UNDERSCORE}.csv"
            echo "Copied GB: ${GB_SRC}"
            COUNT=$((COUNT+1))
          else
            echo "GB file missing: ${GB_SRC}"
          fi

          if [[ -f "${IRE_SRC}" ]]; then
            cp "${IRE_SRC}" "out/results/IRE__${DATE_UNDERSCORE}.csv"
            echo "Copied IRE: ${IRE_SRC}"
            COUNT=$((COUNT+1))
          else
            echo "IRE file missing: ${IRE_SRC}"
          fi

          echo "Copied ${COUNT} region file(s)"
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "No region CSV files found to upload"
            exit 1
          fi

          echo "Payload diagnostics:"
          for f in out/results/*.csv; do
            [ -f "$f" ] || continue
            echo "--- $f"
            wc -l "$f"
            head -n 2 "$f" || true
          done

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-racing-results-${{ replace(steps.yesterday.outputs.date, '/', '_') }}
          path: out/results/*.csv
          if-no-files-found: warn