name: Daily Racing Sync

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  download-results:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: |
          cat > .env << EOF
          EMAIL=${{ secrets.EMAIL }}
          AUTH_STATE=${{ secrets.AUTH_STATE }}
          ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}
          EOF

      - name: Get yesterday's date
        id: yesterday
        run: echo "date=$(date -u -d 'yesterday' +'%Y/%m/%d')" >> "$GITHUB_OUTPUT"

      - name: Download results for GB
        run: |
          cd scripts
          python rpscrape.py -d "${{ steps.yesterday.outputs.date }}" -r gb
        continue-on-error: true

      - name: Download results for IRE
        run: |
          cd scripts
          python rpscrape.py -d "${{ steps.yesterday.outputs.date }}" -r ire
        continue-on-error: true

      - name: Prepare results payload
        shell: bash
        run: |
          mkdir -p out/results
          # Collect recent CSV outputs from data/
          find data -type f -name "*.csv" -mtime -2 -print -exec cp {} out/results/ \;
          COUNT=$(find out/results -type f -name "*.csv" | wc -l)
          echo "Found ${COUNT} CSV file(s) for artifact"
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "No result CSV files found to upload"
            exit 1
          fi

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-unprocessed
          path: out/results/*.csv
          if-no-files-found: error
          retention-days: 1

      # Optional: keep this only if you want rpscrape to trigger racing-prediction immediately
      - name: Trigger racing-prediction pipeline
        if: success()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          gh api repos/Yorktech/racing-prediction/dispatches \
            -X POST \
            -f event_type='results_ready' \
            -f client_payload='{"source":"rpscrape","artifact":"results-unprocessed"}'
