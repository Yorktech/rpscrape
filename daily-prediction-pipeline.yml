name: Daily Prediction Pipeline

on:
  schedule:
    # Run at 08:00 GMT (30 mins after rpscrape daily-racing-sync)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-prediction-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout racing-prediction repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Checkout rpscrape data
        uses: actions/checkout@v4
        with:
          repository: joenano/rpscrape
          path: rpscrape-data
          sparse-checkout: |
            data
            racecards

      - name: Copy data to local directory
        run: |
          mkdir -p data racecards
          cp -r rpscrape-data/data/* data/ 2>/dev/null || true
          cp -r rpscrape-data/racecards/* racecards/ 2>/dev/null || true

      - name: Run prediction pipeline
        run: python pipeline_runner.py morning --scheme baseline_v4_comprehensive
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push predictions
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: Daily prediction pipeline run"
          git push
